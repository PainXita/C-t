<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok View Buffer - Web Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 0 40px rgba(255, 0, 80, 0.15);
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #ff0050, #00f2ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        .header p {
            color: #888;
            font-size: 13px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border 0.3s;
        }
        .input-group input:focus {
            border-color: #ff0050;
        }
        .input-group input::placeholder {
            color: #555;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .input-group {
            flex: 1;
        }
        .hint {
            font-size: 11px;
            color: #666;
            margin-top: -10px;
            margin-bottom: 15px;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-run {
            background: linear-gradient(135deg, #ff0050, #ff3b6e);
            color: #fff;
            margin-bottom: 10px;
        }
        .btn-run:hover:not(:disabled) {
            box-shadow: 0 0 25px rgba(255, 0, 80, 0.5);
            transform: translateY(-1px);
        }
        .btn-run:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
        .btn-stop {
            background: transparent;
            border: 1px solid #ff3333;
            color: #ff3333;
            display: none;
        }
        .btn-stop:hover {
            background: #ff3333;
            color: #fff;
        }
        .status {
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-top: 18px;
            display: none;
        }
        .status.active {
            display: block;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a1a;
            font-size: 13px;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-item .label {
            color: #888;
        }
        .status-item .value {
            color: #fff;
            font-weight: 600;
        }
        .value.success {
            color: #00ff88;
        }
        .value.fail {
            color: #ff3333;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0050, #00f2ea);
            width: 0%;
            transition: width 0.3s;
        }
        .log-box {
            background: #000;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 10px;
            margin-top: 12px;
            max-height: 150px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #0f0;
            display: none;
        }
        .log-box.active {
            display: block;
        }
        .log-box .line {
            padding: 2px 0;
        }
        .log-box .line.error {
            color: #ff4444;
        }
        .log-box .line.warn {
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ TIKTOK VIEW BUFFER</h1>
            <p>Web Tool - Dán link &amp; Chạy</p>
        </div>

        <!-- Ô dán link video -->
        <div class="input-group">
            <label>🔗 Link Video TikTok</label>
            <input type="text" id="videoLink" placeholder="https://www.tiktok.com/@user/video/7346123456789012345">
        </div>

        <!-- Ô ID video tự động điền -->
        <div class="input-group">
            <label>🆔 Video ID (Tự động lấy từ link)</label>
            <input type="text" id="videoId" placeholder="7346123456789012345" readonly style="color:#00f2ea;">
        </div>

        <!-- Hàng thông số -->
        <div class="row">
            <div class="input-group">
                <label>🔢 Số lượt xem</label>
                <input type="number" id="totalViews" value="500" min="1" max="50000">
            </div>
            <div class="input-group">
                <label>⚡ Số luồng</label>
                <input type="number" id="threadCount" value="30" min="1" max="100">
            </div>
        </div>
        <div class="hint">💡 Số luồng cao = nhanh hơn nhưng tốn tài nguyên. Khuyên dùng: 20-50</div>

        <!-- Nút chạy và dừng -->
        <button class="btn-run" id="btnRun" onclick="startBuff()">▶ BẮT ĐẦU BUFF</button>
        <button class="btn-stop" id="btnStop" onclick="stopBuff()">⏹ DỪNG LẠI</button>

        <!-- Khu vực trạng thái -->
        <div class="status" id="statusBox">
            <div class="progress-bar">
                <div class="fill" id="progressFill"></div>
            </div>
            <div class="status-item">
                <span class="label">📤 Đã gửi:</span>
                <span class="value success" id="sentCount">0</span>
            </div>
            <div class="status-item">
                <span class="label">✅ Thành công:</span>
                <span class="value success" id="successCount">0</span>
            </div>
            <div class="status-item">
                <span class="label">❌ Thất bại:</span>
                <span class="value fail" id="failCount">0</span>
            </div>
            <div class="status-item">
                <span class="label">⏱ Thời gian:</span>
                <span class="value" id="elapsedTime">0s</span>
            </div>
            <div class="status-item">
                <span class="label">🚀 Tốc độ:</span>
                <span class="value" id="speedRate">0/s</span>
            </div>
        </div>

        <!-- Log box -->
        <div class="log-box" id="logBox"></div>
    </div>

    <script>
        // ============================================================
        // BIẾN TOÀN CỤC
        // ============================================================
        let isRunning = false;
        let stopRequested = false;
        let totalSent = 0;
        let totalSuccess = 0;
        let totalFail = 0;
        let startTime = 0;
        let activeWorkers = [];

        // ============================================================
        // TỰ ĐỘNG TÁCH ID TỪ LINK KHI NGƯỜI DÙNG DÁN
        // ============================================================
        document.getElementById('videoLink').addEventListener('input', function() {
            const link = this.value.trim();
            const idInput = document.getElementById('videoId');

            if (!link) {
                idInput.value = '';
                idInput.style.color = '#00f2ea';
                return;
            }

            // Các pattern link TikTok phổ biến
            const patterns = [
                /\/video\/(\d+)/,           // https://www.tiktok.com/@user/video/123456
                /\/v\/(\d+)/,               // https://www.tiktok.com/@user/v/123456
                /vm\.tiktok\.com\/(\w+)/,    // Short link (cần resolve, tạm để trống)
            ];

            let found = false;
            for (const pattern of patterns) {
                const match = link.match(pattern);
                if (match && match[1]) {
                    idInput.value = match[1];
                    idInput.style.color = '#00ff88';
                    found = true;
                    break;
                }
            }

            if (!found && link.length > 10) {
                // Nếu người dùng dán thẳng ID số
                if (/^\d{15,20}$/.test(link)) {
                    idInput.value = link;
                    idInput.style.color = '#00ff88';
                } else {
                    idInput.value = 'Không tìm thấy ID trong link';
                    idInput.style.color = '#ff4444';
                }
            }
        });

        // ============================================================
        // HÀM LOG
        // ============================================================
        function log(message, type) {
            const logBox = document.getElementById('logBox');
            const line = document.createElement('div');
            line.className = 'line';
            if (type === 'error') line.className += ' error';
            if (type === 'warn') line.className += ' warn';
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] ${message}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;

            // Giới hạn số dòng log
            while (logBox.children.length > 100) {
                logBox.removeChild(logBox.firstChild);
            }
        }

        // ============================================================
        // HÀM GỬI 1 VIEW (DÙNG XMLHttpRequest ĐỂ TRÁNH CORS)
        // ============================================================
        function sendSingleView(videoId) {
            return new Promise((resolve) => {
                const xhr = new XMLHttpRequest();
                const url = `https://api16-normal-c-useast1a.tiktokv.com/aweme/v1/aweme/stats/?aweme_id=${videoId}&action=view`;

                xhr.open('GET', url, true);
                xhr.timeout = 8000;

                // Set headers giả lập mobile
                const userAgents = [
                    'Mozilla/5.0 (Linux; Android 13; SM-S908B) AppleWebKit/537.36',
                    'Mozilla/5.0 (iPhone; CPU iPhone OS 17_2 like Mac OS X) AppleWebKit/605.1.15',
                    'Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro) AppleWebKit/537.36',
                ];
                xhr.setRequestHeader('User-Agent', userAgents[Math.floor(Math.random() * userAgents.length)]);
                xhr.setRequestHeader('Accept', 'application/json, text/plain, */*');
                xhr.setRequestHeader('Referer', 'https://www.tiktok.com/');

                xhr.onload = function() {
                    resolve(xhr.status === 200);
                };
                xhr.onerror = function() {
                    resolve(false);
                };
                xhr.ontimeout = function() {
                    resolve(false);
                };

                xhr.send();
            });
        }

        // ============================================================
        // HÀM WORKER: CHẠY 1 LUỒNG LIÊN TỤC
        // ============================================================
        async function workerThread(videoId, viewsToSend, threadId) {
            let sent = 0;
            let success = 0;

            while (sent < viewsToSend && !stopRequested) {
                const result = await sendSingleView(videoId);
                sent++;
                totalSent++;

                if (result) {
                    success++;
                    totalSuccess++;
                } else {
                    totalFail++;
                }

                // Cập nhật UI mỗi 5 view
                if (totalSent % 5 === 0) {
                    updateUI();
                }

                // Delay ngẫu nhiên 500-2000ms
                const delay = 500 + Math.random() * 1500;
                await new Promise(r => setTimeout(r, delay));
            }

            updateUI();
            return { sent, success, threadId };
        }

        // ============================================================
        // HÀM CẬP NHẬT GIAO DIỆN
        // ============================================================
        function updateUI() {
            const totalTarget = parseInt(document.getElementById('totalViews').value) || 500;
            const percent = Math.min(100, Math.round((totalSent / totalTarget) * 100));
            const elapsed = (Date.now() - startTime) / 1000;
            const speed = elapsed > 0 ? Math.round(totalSuccess / elapsed) : 0;

            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('sentCount').textContent = totalSent;
            document.getElementById('successCount').textContent = totalSuccess;
            document.getElementById('failCount').textContent = totalFail;
            document.getElementById('elapsedTime').textContent = Math.round(elapsed) + 's';
            document.getElementById('speedRate').textContent = speed + '/s';
        }

        // ============================================================
        // HÀM BẮT ĐẦU BUFF
        // ============================================================
        async function startBuff() {
            if (isRunning) return;

            // Lấy giá trị từ input
            const videoId = document.getElementById('videoId').value.trim();
            const totalViews = parseInt(document.getElementById('totalViews').value) || 500;
            const threadCount = parseInt(document.getElementById('threadCount').value) || 30;

            // Validate video ID
            if (!videoId || videoId.length < 15 || !/^\d+$/.test(videoId)) {
                alert('⚠️ Vui lòng dán link TikTok hợp lệ để lấy Video ID!');
                return;
            }

            // Validate thông số
            if (totalViews < 1 || totalViews > 50000) {
                alert('⚠️ Số lượt xem phải từ 1 đến 50.000');
                return;
            }
            if (threadCount < 1 || threadCount > 100) {
                alert('⚠️ Số luồng phải từ 1 đến 100');
                return;
            }

            // Reset biến
            isRunning = true;
            stopRequested = false;
            totalSent = 0;
            totalSuccess = 0;
            totalFail = 0;
            startTime = Date.now();
            activeWorkers = [];

            // Cập nhật UI
            document.getElementById('btnRun').disabled = true;
            document.getElementById('btnRun').textContent = '⏳ ĐANG CHẠY...';
            document.getElementById('btnStop').style.display = 'block';
            document.getElementById('statusBox').classList.add('active');
            document.getElementById('logBox').classList.add('active');
            document.getElementById('logBox').innerHTML = '';

            log('🚀 Bắt đầu buff view TikTok', '');
            log(`📋 Video ID: ${videoId}`, '');
            log(`🎯 Mục tiêu: ${totalViews} views | Luồng: ${threadCount}`, '');
            log('⏳ Đang khởi động các luồng...', '');

            // Tính số view mỗi luồng
            const viewsPerThread = Math.ceil(totalViews / threadCount);

            // Khởi chạy các worker
            const promises = [];
            for (let i = 0; i < threadCount; i++) {
                const views = Math.min(viewsPerThread, totalViews - i * viewsPerThread);
                if (views <= 0) break;

                const promise = workerThread(videoId, views, i);
                promises.push(promise);
                activeWorkers.push(promise);
            }

            // Đợi tất cả worker hoàn thành
            await Promise.allSettled(promises);

            // Kết thúc
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            isRunning = false;
            document.getElementById('btnRun').disabled = false;
            document.getElementById('btnRun').textContent = '▶ BẮT ĐẦU BUFF';
            document.getElementById('btnStop').style.display = 'none';

            log('', '');
            log('✅ HOÀN THÀNH!', '');
            log(`📊 Tổng: ${totalSent} | Thành công: ${totalSuccess} | Thất bại: ${totalFail}`, '');
            log(`⏱ Thời gian: ${elapsed}s | Tốc độ: ${Math.round(totalSuccess/elapsed)}/s`, '');

            updateUI();
        }

        // ============================================================
        // HÀM DỪNG BUFF
        // ============================================================
        function stopBuff() {
            if (!isRunning) return;
            stopRequested = true;
            log('⚠️ Đang dừng... Vui lòng đợi các luồng kết thúc.', 'warn');
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStop').textContent = '⏹ ĐANG DỪNG...';
        }
    </script>
</body>
</html>
