<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script Dumper & Decompiler - PainXita Tool</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111;
            --border: #252525;
            --cyan: #00f2ea;
            --red: #ff0050;
            --green: #00ff88;
            --yellow: #ffaa00;
            --text: #ccc;
            --white: #fff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', 'Consolas', monospace;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            padding: 30px 0;
        }
        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, var(--cyan), var(--red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        .header p {
            color: #666;
            font-size: 0.9em;
        }
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
        }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
        }
        .panel h2 {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        textarea {
            width: 100%;
            height: 350px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--green);
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
            outline: none;
        }
        textarea:focus {
            border-color: var(--cyan);
        }
        textarea::placeholder {
            color: #333;
        }
        .drop-zone {
            border: 2px dashed #333;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            background: #080808;
        }
        .drop-zone:hover, .drop-zone.active {
            border-color: var(--cyan);
            background: #0a1010;
        }
        .drop-zone .icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .drop-zone p {
            color: #666;
            font-size: 14px;
        }
        .drop-zone .small {
            font-size: 11px;
            color: #444;
            margin-top: 5px;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Segoe UI', sans-serif;
        }
        .btn-dump {
            background: linear-gradient(135deg, var(--cyan), #00c4b8);
            color: #000;
            flex: 1;
        }
        .btn-dump:hover {
            box-shadow: 0 0 25px rgba(0,242,234,0.4);
        }
        .btn-clear {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
        }
        .btn-clear:hover {
            border-color: var(--red);
            color: var(--red);
        }
        .btn-copy {
            background: transparent;
            border: 1px solid var(--green);
            color: var(--green);
        }
        .btn-copy:hover {
            background: var(--green);
            color: #000;
        }
        .btn-download {
            background: transparent;
            border: 1px solid var(--yellow);
            color: var(--yellow);
        }
        .btn-download:hover {
            background: var(--yellow);
            color: #000;
        }
        .output-area {
            position: relative;
        }
        .output-area textarea {
            color: #0f0;
            height: 400px;
        }
        .stats {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: #0a0a0a;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 14px;
            font-size: 12px;
        }
        .stat-item .label {
            color: #666;
        }
        .stat-item .value {
            color: var(--cyan);
            font-weight: 600;
        }
        .log {
            background: #000;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-size: 12px;
            font-family: 'Consolas', monospace;
        }
        .log .log-line { padding: 3px 0; }
        .log .log-success { color: #0f0; }
        .log .log-info { color: #0af; }
        .log .log-warn { color: #fa0; }
        .log .log-error { color: #f00; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ SCRIPT DUMPER & DECOMPILER</h1>
            <p>Dán code hoặc Upload file .lua / .luac → Giải mã ra code gốc</p>
        </div>

        <div class="main-grid">
            <!-- PANEL INPUT -->
            <div class="panel">
                <h2>📥 INPUT - Dán Script hoặc Upload File</h2>
                
                <!-- Drop zone upload -->
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div class="icon">📂</div>
                    <p>Kéo thả file vào đây hoặc Click để chọn</p>
                    <p class="small">Hỗ trợ: .lua, .luac, .txt, .script</p>
                </div>
                <input type="file" id="fileInput" accept=".lua,.luac,.txt,.script" multiple>

                <textarea id="inputCode" placeholder="Dán script bị mã hoá / obfuscate vào đây...&#10;&#10;Ví dụ:&#10;\27\76\117\97\81\0\1\4\8\4\8\0...&#10;hoặc:&#10;local a=loadstring(game:HttpGet('...'))()..."></textarea>

                <div class="btn-row">
                    <button class="btn-dump" onclick="dumpScript()">🔓 DUMP & DECOMPILE</button>
                    <button class="btn-clear" onclick="clearAll()">🗑 XOÁ HẾT</button>
                </div>
            </div>

            <!-- PANEL OUTPUT -->
            <div class="panel output-area">
                <h2>📤 OUTPUT - Code gốc đã giải mã</h2>
                <textarea id="outputCode" placeholder="Kết quả giải mã sẽ hiện ở đây..." readonly></textarea>
                <div class="btn-row">
                    <button class="btn-copy" onclick="copyOutput()">📋 COPY CODE</button>
                    <button class="btn-download" onclick="downloadOutput()">💾 TẢI FILE .LUA</button>
                </div>
                <div class="stats" id="statsContainer"></div>
            </div>
        </div>

        <!-- LOG -->
        <div class="log" id="logBox">
            <div class="log-line log-info">[~] Sẵn sàng. Dán script hoặc upload file để bắt đầu.</div>
        </div>
    </div>

    <script>
        // ============================================================
        // BIẾN TOÀN CỤC
        // ============================================================
        const logBox = document.getElementById('logBox');
        const inputCode = document.getElementById('inputCode');
        const outputCode = document.getElementById('outputCode');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statsContainer = document.getElementById('statsContainer');

        // ============================================================
        // HÀM LOG
        // ============================================================
        function addLog(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] ${msg}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
            while (logBox.children.length > 50) logBox.removeChild(logBox.firstChild);
        }

        // ============================================================
        // HÀM HIỂN THỊ STATS
        // ============================================================
        function showStats(inputLen, outputLen, method, duration) {
            const inputKB = (inputLen / 1024).toFixed(2);
            const outputKB = (outputLen / 1024).toFixed(2);
            const ratio = inputLen > 0 ? ((outputLen / inputLen) * 100).toFixed(1) : 0;

            statsContainer.innerHTML = `
                <div class="stat-item"><span class="label">Input:</span> <span class="value">${inputKB} KB</span></div>
                <div class="stat-item"><span class="label">Output:</span> <span class="value">${outputKB} KB</span></div>
                <div class="stat-item"><span class="label">Tỉ lệ:</span> <span class="value">${ratio}%</span></div>
                <div class="stat-item"><span class="label">Phương pháp:</span> <span class="value">${method}</span></div>
                <div class="stat-item"><span class="label">Thời gian:</span> <span class="value">${duration}ms</span></div>
            `;
        }

        // ============================================================
        // UPLOAD FILE: KÉO THẢ + CLICK
        // ============================================================
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('active');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('active');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('active');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => {
            handleFiles(fileInput.files);
            fileInput.value = '';
        });

        async function handleFiles(files) {
            for (const file of files) {
                addLog(`📂 Đọc file: ${file.name} (${(file.size/1024).toFixed(1)} KB)`, 'info');
                try {
                    const text = await file.text();
                    inputCode.value = text;
                    addLog(`✅ Đã tải file: ${file.name}`, 'success');
                } catch (err) {
                    addLog(`❌ Lỗi đọc file: ${file.name}`, 'error');
                }
            }
        }

        // ============================================================
        // PHÁT HIỆN LOẠI MÃ HOÁ
        // ============================================================
        function detectObfuscationType(code) {
            if (!code || code.trim().length === 0) return 'empty';

            const firstChars = code.trim().substring(0, 100);

            // Lua bytecode header
            if (code.includes('\x1b\x4c\x75\x61') || code.includes('\\27\\76\\117\\97') || 
                firstChars.match(/^\x1bLua/) || code.startsWith('\x1bLua')) {
                return 'luac_bytecode';
            }

            // Escaped bytecode
            if (firstChars.match(/^\\27\\76\\117\\97/) || firstChars.match(/^\\\d{1,3}\\?\d{1,3}/)) {
                return 'escaped_bytecode';
            }

            // loadstring / game:HttpGet obfuscation
            if (code.includes('loadstring') || code.includes('load') || 
                code.includes('HttpGet') || code.includes('game:HttpGet')) {
                return 'loadstring_wrap';
            }

            // IronBrew / Luraph / Moonsec
            if (firstChars.includes('IronBrew') || firstChars.includes('Luraph') || 
                firstChars.includes('Moonsec') || firstChars.includes('PSU')) {
                return 'commercial_obfuscator';
            }

            // Beautified / minified Lua
            if (code.includes('local ') || code.includes('function ') || code.includes('end')) {
                const avgLineLen = code.split('\n').reduce((a, l) => a + l.length, 0) / Math.max(code.split('\n').length, 1);
                if (avgLineLen > 200) return 'minified_lua';
                return 'plain_lua';
            }

            // Hex encoded
            if (firstChars.match(/^[0-9a-fA-F]{20,}$/) || firstChars.match(/^\\x[0-9a-fA-F]{2}/)) {
                return 'hex_encoded';
            }

            // Base64 encoded
            if (firstChars.match(/^[A-Za-z0-9+/=]{30,}$/)) {
                return 'base64_encoded';
            }

            return 'unknown';
        }

        // ============================================================
        // GIẢI MÃ CÁC LỚP OBFUSCATION
        // ============================================================
        function deobfuscate(code) {
            let result = code;
            let methods = [];

            // Lớp 1: Bóc loadstring wrapper
            if (result.includes('loadstring') || result.includes('load(')) {
                const loadPatterns = [
                    /loadstring\s*\(\s*(['"])(.*?)\1\s*\)\s*\(\)/gs,
                    /load\s*\(\s*(['"])(.*?)\1\s*\)\s*\(\)/gs,
                    /loadstring\s*\(\s*game:HttpGet\s*\(\s*(['"])(.*?)\1\s*\)\s*\)\s*\(\)/gs,
                ];
                for (const pattern of loadPatterns) {
                    const match = pattern.exec(result);
                    if (match && match[2]) {
                        result = match[2];
                        methods.push('loadstring_unwrap');
                        break;
                    }
                }
            }

            // Lớp 2: Giải mã escaped byte sequence (\27\76\117...)
            if (result.includes('\\27\\76') || result.match(/\\\d{1,3}/g)) {
                result = result.replace(/\\(\d{1,3})/g, (match, num) => {
                    return String.fromCharCode(parseInt(num));
                });
                methods.push('escape_decode');
            }

            // Lớp 3: Giải mã hex (\x41\x42...)
            if (result.includes('\\x')) {
                result = result.replace(/\\x([0-9a-fA-F]{2})/g, (match, hex) => {
                    return String.fromCharCode(parseInt(hex, 16));
                });
                methods.push('hex_decode');
            }

            // Lớp 4: Giải mã Base64 nếu phát hiện
            if (/^[A-Za-z0-9+/=]{50,}$/.test(result.trim())) {
                try {
                    const decoded = atob(result.trim());
                    if (decoded.includes('function') || decoded.includes('local') || decoded.includes('\x1bLua')) {
                        result = decoded;
                        methods.push('base64_decode');
                    }
                } catch (e) {}
            }

            // Lớp 5: Beautify code (thêm xuống dòng, indent)
            result = beautifyLua(result);
            methods.push('beautify');

            return { code: result, methods };
        }

        // ============================================================
        // BEAUTIFY LUA CODE
        // ============================================================
        function beautifyLua(code) {
            if (!code) return code;

            let result = code;

            // Thêm xuống dòng sau dấu ; nếu có nhiều lệnh 1 dòng
            result = result.replace(/;(?!\n)/g, ';\n');

            // Thêm xuống dòng trước các từ khoá chính
            const keywords = ['function ', 'local function ', 'if ', 'for ', 'while ', 'do', 'repeat', 'elseif ', 'else', 'end'];
            for (const kw of keywords) {
                const regex = new RegExp(`([^\\n])\\b(${kw.replace(/\s/g, '\\s')})\\b`, 'g');
                result = result.replace(regex, '$1\n$2');
            }

            // Thêm xuống dòng sau end
            result = result.replace(/\bend\b(?![\n\)\]\}])/g, 'end\n');

            // Thêm xuống dòng sau then, do
            result = result.replace(/\bthen\b(?!\n)/g, 'then\n');
            result = result.replace(/\bdo\b(?!\n)/g, 'do\n');

            // Indent cơ bản
            let lines = result.split('\n');
            let indent = 0;
            let beautified = [];

            for (let line of lines) {
                line = line.trim();
                if (line.length === 0) continue;

                // Giảm indent trước các từ khoá kết thúc
                if (line.match(/^(end|until|else|elseif)/)) {
                    indent = Math.max(0, indent - 1);
                }

                // Thêm indent
                beautified.push('\t'.repeat(indent) + line);

                // Tăng indent sau các từ khoá mở block
                if (line.match(/\b(function|if|for|while|do|repeat|else|elseif)\b/) && 
                    !line.match(/\bend\b/)) {
                    indent = Math.min(indent + 1, 10);
                }
            }

            return beautified.join('\n');
        }

        // ============================================================
        // HÀM DUMP CHÍNH
        // ============================================================
        function dumpScript() {
            const startTime = performance.now();
            const input = inputCode.value.trim();

            if (!input) {
                addLog('⚠️ Vui lòng dán script hoặc upload file trước!', 'warn');
                return;
            }

            addLog('🔍 Bắt đầu phân tích script...', 'info');

            // Phát hiện loại mã hoá
            const obfType = detectObfuscationType(input);
            addLog(`📋 Phát hiện: ${getObfuscationName(obfType)}`, 'info');

            let output = '';
            let method = '';

            switch (obfType) {
                case 'empty':
                    addLog('❌ Script trống!', 'error');
                    return;

                case 'luac_bytecode':
                    addLog('⚠️ Phát hiện Lua Bytecode (đã biên dịch). Cần decompiler chuyên dụng.', 'warn');
                    output = dumpBytecodeInfo(input);
                    method = 'bytecode_info';
                    break;

                case 'escaped_bytecode':
                case 'hex_encoded':
                case 'base64_encoded':
                case 'loadstring_wrap':
                case 'commercial_obfuscator':
                case 'minified_lua':
                case 'unknown':
                    const result = deobfuscate(input);
                    output = result.code;
                    method = result.methods.join(' → ');
                    break;

                case 'plain_lua':
                    output = beautifyLua(input);
                    method = 'beautify_only';
                    break;

                default:
                    output = input;
                    method = 'raw';
            }

            // Hiển thị output
            outputCode.value = output;

            const duration = Math.round(performance.now() - startTime);
            showStats(input.length, output.length, method, duration);

            addLog(`✅ Hoàn thành! ${method} | ${duration}ms`, 'success');
            addLog(`📊 Input: ${(input.length/1024).toFixed(1)}KB → Output: ${(output.length/1024).toFixed(1)}KB`, 'info');
        }

        function getObfuscationName(type) {
            const names = {
                'empty': 'Script trống',
                'luac_bytecode': 'Lua Bytecode (đã biên dịch)',
                'escaped_bytecode': 'Bytecode escaped (\\27\\76...)',
                'hex_encoded': 'Hex encoded (\\x41...)',
                'base64_encoded': 'Base64 encoded',
                'loadstring_wrap': 'Loadstring wrapper',
                'commercial_obfuscator': 'IronBrew/Luraph/Moonsec',
                'minified_lua': 'Lua bị nén (minified)',
                'plain_lua': 'Lua thường (đã rõ ràng)',
                'unknown': 'Không xác định',
            };
            return names[type] || type;
        }

        function dumpBytecodeInfo(code) {
            let info = [];
            info.push('-- ========================================');
            info.push('-- LUA BYTECODE DETECTED');
            info.push('-- Không thể decompile hoàn toàn trong web');
            info.push('-- Cần công cụ: unluac, luadec, hoặc LuaDec');
            info.push('-- ========================================');
            info.push('');

            // Kiểm tra version Lua
            if (code.includes('\x1bLuaQ')) info.push('-- Lua version: 5.1');
            else if (code.includes('\x1bLuaR')) info.push('-- Lua version: 5.2');
            else if (code.includes('\x1bLuaS')) info.push('-- Lua version: 5.3');
            else if (code.includes('\x1bLuaT')) info.push('-- Lua version: 5.4');
            else info.push('-- Lua version: Unknown');

            // Số instruction ước tính
            const estInstructions = Math.floor(code.length / 4);
            info.push(`-- Estimated instructions: ~${estInstructions}`);
            info.push('');

            // Hex dump 100 bytes đầu
            info.push('-- First 100 bytes (hex):');
            let hexDump = '';
            for (let i = 0; i < Math.min(code.length, 100); i++) {
                hexDump += code.charCodeAt(i).toString(16).padStart(2, '0') + ' ';
                if ((i + 1) % 16 === 0) hexDump += '\n-- ';
            }
            info.push('-- ' + hexDump);
            info.push('');
            info.push('-- Gợi ý: Tải file này về và dùng tool LuaDec để decompile');
            info.push('-- Link: github.com/viruscamp/luadec');

            return info.join('\n');
        }

        // ============================================================
        // NÚT CHỨC NĂNG
        // ============================================================
        function copyOutput() {
            const output = outputCode.value;
            if (!output) {
                addLog('⚠️ Không có gì để copy!', 'warn');
                return;
            }
            navigator.clipboard.writeText(output).then(() => {
                addLog('📋 Đã copy code vào clipboard!', 'success');
            }).catch(() => {
                outputCode.select();
                document.execCommand('copy');
                addLog('📋 Đã copy (fallback)!', 'success');
            });
        }

        function downloadOutput() {
            const output = outputCode.value;
            if (!output) {
                addLog('⚠️ Không có gì để tải!', 'warn');
                return;
            }
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'decompiled_' + Date.now() + '.lua';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            addLog('💾 Đã tải file decompiled.lua!', 'success');
        }

        function clearAll() {
            inputCode.value = '';
            outputCode.value = '';
            statsContainer.innerHTML = '';
            addLog('🗑 Đã xoá tất cả.', 'info');
        }

        // ============================================================
        // PHÍM TẮT: Ctrl+Enter = Dump
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                dumpScript();
            }
        });

        // ============================================================
        // KHỞI TẠO
        // ============================================================
        addLog('🚀 PainXita Script Dumper & Decompiler sẵn sàng.', 'success');
        addLog('💡 Kéo thả file hoặc dán code → Nhấn DUMP (Ctrl+Enter).', 'info');
    </script>
</body>
</html>
