<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok View Buffer v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a; color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }
        .container {
            background: #1a1a1a; border: 1px solid #333;
            border-radius: 16px; padding: 30px; width: 100%;
            max-width: 550px; box-shadow: 0 0 40px rgba(0,242,234,0.15);
        }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #00f2ea, #ff0050);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; font-size: 13px; }
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block; font-size: 13px; color: #aaa;
            margin-bottom: 6px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .input-group input {
            width: 100%; padding: 12px 16px;
            background: #0d0d0d; border: 1px solid #333;
            border-radius: 10px; color: #fff; font-size: 14px;
            outline: none; transition: border 0.3s;
        }
        .input-group input:focus { border-color: #00f2ea; }
        .input-group input::placeholder { color: #555; }
        .row { display: flex; gap: 12px; }
        .row .input-group { flex: 1; }
        .hint { font-size: 11px; color: #666; margin-top: -10px; margin-bottom: 15px; }
        button {
            width: 100%; padding: 14px; border: none;
            border-radius: 10px; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn-run {
            background: linear-gradient(135deg, #00f2ea, #00c4b8);
            color: #000; margin-bottom: 10px;
        }
        .btn-run:hover:not(:disabled) { box-shadow: 0 0 25px rgba(0,242,234,0.5); transform: translateY(-1px); }
        .btn-run:disabled { background: #333; color: #666; cursor: not-allowed; }
        .btn-stop { background: transparent; border: 1px solid #ff3333; color: #ff3333; display: none; }
        .btn-stop:hover { background: #ff3333; color: #fff; }
        .status { background: #0d0d0d; border: 1px solid #333; border-radius: 10px; padding: 15px; margin-top: 18px; display: none; }
        .status.active { display: block; }
        .status-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .status-item:last-child { border-bottom: none; }
        .status-item .label { color: #888; }
        .status-item .value { color: #fff; font-weight: 600; }
        .value.success { color: #00ff88; }
        .value.fail { color: #ff3333; }
        .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-top: 12px; overflow: hidden; }
        .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #00f2ea, #ff0050); width: 0%; transition: width 0.3s; }
        .log-box {
            background: #000; border: 1px solid #222; border-radius: 8px;
            padding: 10px; margin-top: 12px; max-height: 150px;
            overflow-y: auto; font-family: 'Courier New', monospace;
            font-size: 11px; color: #0f0; display: none;
        }
        .log-box.active { display: block; }
        .log-box .line { padding: 2px 0; }
        .log-box .line.error { color: #ff4444; }
        .log-box .line.warn { color: #ffaa00; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ TIKTOK VIEW BUFFER v2</h1>
            <p>Proxy CORS Bypass - Hoạt động thật</p>
        </div>

        <div class="input-group">
            <label>🔗 Link Video TikTok</label>
            <input type="text" id="videoLink" placeholder="https://www.tiktok.com/@user/video/1234567890123456789">
        </div>

        <div class="input-group">
            <label>🆔 Video ID (Tự động lấy)</label>
            <input type="text" id="videoId" placeholder="1234567890123456789" readonly style="color:#00f2ea;">
        </div>

        <div class="row">
            <div class="input-group">
                <label>🔢 Số lượt xem</label>
                <input type="number" id="totalViews" value="500" min="1" max="50000">
            </div>
            <div class="input-group">
                <label>⚡ Số luồng</label>
                <input type="number" id="threadCount" value="20" min="1" max="100">
            </div>
        </div>
        <div class="hint">💡 Tool dùng proxy CORS để gửi request thật tới TikTok API</div>

        <button class="btn-run" id="btnRun" onclick="startBuff()">▶ BẮT ĐẦU BUFF</button>
        <button class="btn-stop" id="btnStop" onclick="stopBuff()">⏹ DỪNG LẠI</button>

        <div class="status" id="statusBox">
            <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
            <div class="status-item"><span class="label">📤 Đã gửi:</span><span class="value" id="sentCount">0</span></div>
            <div class="status-item"><span class="label">✅ Thành công:</span><span class="value success" id="successCount">0</span></div>
            <div class="status-item"><span class="label">❌ Thất bại:</span><span class="value fail" id="failCount">0</span></div>
            <div class="status-item"><span class="label">⏱ Thời gian:</span><span class="value" id="elapsedTime">0s</span></div>
            <div class="status-item"><span class="label">🚀 Tốc độ:</span><span class="value" id="speedRate">0/s</span></div>
        </div>
        <div class="log-box" id="logBox"></div>
    </div>

    <script>
        // ============================================================
        // BIẾN TOÀN CỤC
        // ============================================================
        let isRunning = false;
        let stopRequested = false;
        let totalSent = 0;
        let totalSuccess = 0;
        let totalFail = 0;
        let startTime = 0;

        // DANH SÁCH PROXY CORS MIỄN PHÍ (sẽ thử lần lượt)
        const CORS_PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://api.codetabs.com/v1/proxy?quest=',
        ];

        // ============================================================
        // TỰ ĐỘNG TÁCH ID TỪ LINK
        // ============================================================
        document.getElementById('videoLink').addEventListener('input', function() {
            const link = this.value.trim();
            const idInput = document.getElementById('videoId');
            if (!link) { idInput.value = ''; idInput.style.color = '#00f2ea'; return; }

            const patterns = [
                /\/(video|photo|v)\/(\d+)/,
                /\/video\/(\d+)/,
                /\/photo\/(\d+)/,
            ];

            let found = false;
            for (const pattern of patterns) {
                const match = link.match(pattern);
                if (match) {
                    const id = match[2] || match[1];
                    if (id && /^\d+$/.test(id) && id.length >= 15) {
                        idInput.value = id;
                        idInput.style.color = '#00ff88';
                        found = true;
                        break;
                    }
                }
            }
            if (!found && /^\d{15,20}$/.test(link)) {
                idInput.value = link;
                idInput.style.color = '#00ff88';
            } else if (!found && link.length > 10) {
                idInput.value = 'Không tìm thấy ID';
                idInput.style.color = '#ff4444';
            }
        });

        // ============================================================
        // HÀM LOG
        // ============================================================
        function log(message, type) {
            const logBox = document.getElementById('logBox');
            const line = document.createElement('div');
            line.className = 'line';
            if (type === 'error') line.className += ' error';
            if (type === 'warn') line.className += ' warn';
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] ${message}`;
            logBox.appendChild(line);
            logBox.scrollTop = logBox.scrollHeight;
            while (logBox.children.length > 100) logBox.removeChild(logBox.firstChild);
        }

        // ============================================================
        // HÀM GỬI 1 VIEW QUA PROXY (BYBASS CORS)
        // ============================================================
        async function sendSingleView(videoId) {
            // Tạo URL API TikTok thật
            const apiUrl = `https://api16-normal-c-useast1a.tiktokv.com/aweme/v1/aweme/stats/?aweme_id=${videoId}&action=view`;
            const encodedUrl = encodeURIComponent(apiUrl);

            // User-Agent giả lập mobile
            const userAgents = [
                'Mozilla/5.0 (Linux; Android 13; SM-S908B) AppleWebKit/537.36',
                'Mozilla/5.0 (iPhone; CPU iPhone OS 17_2 like Mac OS X) AppleWebKit/605.1.15',
                'Mozilla/5.0 (Linux; Android 14; Pixel 8 Pro) AppleWebKit/537.36',
            ];

            // Thử từng proxy
            for (const proxy of CORS_PROXIES) {
                try {
                    const response = await fetch(proxy + encodedUrl, {
                        method: 'GET',
                        headers: {
                            'User-Agent': userAgents[Math.floor(Math.random() * userAgents.length)],
                            'Accept': 'application/json',
                        },
                        // Timeout 5 giây
                        signal: AbortSignal.timeout(5000),
                    });
                    if (response.ok) {
                        return true;
                    }
                } catch (e) {
                    // Proxy này lỗi, thử proxy khác
                    continue;
                }
            }
            return false;
        }

        // ============================================================
        // HÀM CẬP NHẬT UI
        // ============================================================
        function updateUI() {
            const totalTarget = parseInt(document.getElementById('totalViews').value) || 500;
            const percent = Math.min(100, Math.round((totalSent / totalTarget) * 100));
            const elapsed = (Date.now() - startTime) / 1000;
            const speed = elapsed > 0 ? Math.round(totalSuccess / elapsed) : 0;

            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('sentCount').textContent = totalSent;
            document.getElementById('successCount').textContent = totalSuccess;
            document.getElementById('failCount').textContent = totalFail;
            document.getElementById('elapsedTime').textContent = Math.round(elapsed) + 's';
            document.getElementById('speedRate').textContent = speed + '/s';
        }

        // ============================================================
        // WORKER 1 LUỒNG
        // ============================================================
        async function workerThread(videoId, viewsToSend) {
            let sent = 0;
            let success = 0;

            for (let i = 0; i < viewsToSend && !stopRequested; i++) {
                const result = await sendSingleView(videoId);
                sent++;
                totalSent++;
                if (result) { success++; totalSuccess++; }
                else { totalFail++; }

                if (totalSent % 3 === 0) updateUI();

                // Delay 800-2000ms
                const delay = 800 + Math.random() * 1200;
                await new Promise(r => setTimeout(r, delay));
            }
            updateUI();
            return { sent, success };
        }

        // ============================================================
        // BẮT ĐẦU BUFF
        // ============================================================
        async function startBuff() {
            if (isRunning) return;

            const videoId = document.getElementById('videoId').value.trim();
            const totalViews = parseInt(document.getElementById('totalViews').value) || 500;
            const threadCount = parseInt(document.getElementById('threadCount').value) || 20;

            if (!videoId || videoId.length < 15 || !/^\d+$/.test(videoId)) {
                alert('⚠️ Vui lòng dán link TikTok hợp lệ!');
                return;
            }
            if (totalViews < 1 || totalViews > 50000) {
                alert('⚠️ Số lượt xem từ 1 đến 50.000');
                return;
            }
            if (threadCount < 1 || threadCount > 100) {
                alert('⚠️ Số luồng từ 1 đến 100');
                return;
            }

            isRunning = true;
            stopRequested = false;
            totalSent = 0;
            totalSuccess = 0;
            totalFail = 0;
            startTime = Date.now();

            document.getElementById('btnRun').disabled = true;
            document.getElementById('btnRun').textContent = '⏳ ĐANG CHẠY...';
            document.getElementById('btnStop').style.display = 'block';
            document.getElementById('statusBox').classList.add('active');
            document.getElementById('logBox').classList.add('active');
            document.getElementById('logBox').innerHTML = '';

            log('🚀 Bắt đầu buff view TikTok v2', '');
            log(`📋 ID: ${videoId} | Mục tiêu: ${totalViews} | Luồng: ${threadCount}`, '');
            log('🔄 Đang dùng proxy CORS bypass...', 'warn');

            const viewsPerThread = Math.ceil(totalViews / threadCount);
            const promises = [];

            for (let i = 0; i < threadCount; i++) {
                const views = Math.min(viewsPerThread, totalViews - i * viewsPerThread);
                if (views <= 0) break;
                promises.push(workerThread(videoId, views));
            }

            await Promise.allSettled(promises);

            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            isRunning = false;
            document.getElementById('btnRun').disabled = false;
            document.getElementById('btnRun').textContent = '▶ BẮT ĐẦU BUFF';
            document.getElementById('btnStop').style.display = 'none';

            log('', '');
            log('✅ HOÀN THÀNH!', '');
            log(`📊 Gửi: ${totalSent} | OK: ${totalSuccess} | Fail: ${totalFail}`, '');
            log(`⏱ ${elapsed}s | 🚀 ${Math.round(totalSuccess/elapsed)}/s`, '');
            updateUI();
        }

        function stopBuff() {
            if (!isRunning) return;
            stopRequested = true;
            log('⚠️ Đang dừng...', 'warn');
            document.getElementById('btnStop').disabled = true;
            document.getElementById('btnStop').textContent = '⏹ ĐANG DỪNG...';
        }
    </script>
</body>
</html>
